<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demeter — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-wrapper">
    <div class="card login-card">
        <h1>DEMETER</h1>
        <p class="login-subtitle">Restricted Access: Precision Biosphere</p>

        {% if error %}
        <div class="error-message">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">Operator ID</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Security Protocol</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="" required>
            </div>
            <button type="submit" class="btn-primary btn-block" id="btn-login">Login to System</button>
        </form>
    </div>
</body>
</html>
