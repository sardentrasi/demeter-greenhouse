<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demeter — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-[#e8ebe6] text-[#0e0f0c] flex items-center justify-center min-h-screen p-6">

    <div class="wise-card w-full max-w-[460px] p-10 md:p-14 text-center">

        <!-- Brand -->
        <div class="flex items-center justify-center gap-3 mb-12">
            <div class="w-12 h-12 rounded-full bg-[#163300] text-[#9fe870] flex items-center justify-center border border-[#9fe870]/30 shadow-[0_0_15px_rgba(159,232,112,0.3)]">
                <i data-lucide="droplets" class="w-6 h-6" stroke-width="3"></i>
            </div>
            <span class="text-[28px] font-display uppercase tracking-tight">Demeter<span class="text-[#9fe870]">.</span></span>
        </div>

        <h1 class="text-[56px] md:text-[72px] font-display uppercase leading-[0.85] mb-4">Garden<br>Access</h1>
        <p class="text-[14px] font-bold text-[#868685] uppercase tracking-widest mb-10">Secure Biosphere Management</p>

        <form action="/login" method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-widest text-[#454745] mb-2 px-1">Operator Key</label>
                <input type="password" name="password" class="form-control !py-4 !text-center !text-[18px]" placeholder="••••••••" required autofocus>
            </div>

            {% if error %}
            <div class="bg-[#d03238]/10 text-[#d03238] p-4 rounded-[16px] text-[12px] font-bold uppercase tracking-wider flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="btn-wise w-full py-5 text-[16px]">
                Open Command Center
            </button>
        </form>

        <div class="mt-12 pt-8 border-t border-[#e8ebe6]">
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-[#868685]">Demeter AI Agronomist v6.2</p>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
